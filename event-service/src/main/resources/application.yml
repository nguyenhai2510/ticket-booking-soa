server:
  port: 8082

spring:
  application:
    name: event-service
  datasource:
    url: jdbc:postgresql://localhost:5432/db_event
    username: postgres
    # Thay 123456 bằng mật khẩu thật của bạn lúc nãy
    password: 123456
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      # Lệnh này bảo Spring Boot tự động tạo bảng trong DB dựa trên code Java
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true